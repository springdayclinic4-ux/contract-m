services:
  # Backend API
  - type: web
    name: theranova-backend
    env: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: theranova-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MOCK_EMAIL
        value: true
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /api/health

databases:
  - name: theranova-db
    databaseName: theranova
    plan: free
    region: singapore
